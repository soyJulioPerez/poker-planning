<ul class="participant-list">
  @for (participant of participants(); track participant.name) {
    <li class="participant-list__item" [class.participant-list__item--disconnected]="!participant.connected">
      <span class="participant-list__name">{{ participant.name }}</span>
      @if (participant.isModerator) {
        <app-moderator-badge />
      }
      @if (!participant.connected) {
        <span class="participant-list__status">desconectado</span>
      } @else if (participant.isVoter) {
        @if (participant.vote !== null) {
          <span class="participant-list__vote-status participant-list__vote-status--voted">✓ votó</span>
        } @else {
          <span class="participant-list__vote-status">esperando voto</span>
        }
      }
    </li>
  }
</ul>
